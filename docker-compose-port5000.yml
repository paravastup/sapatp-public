version: '3'

services:
  web:
    build: .
    expose:
      - "8000"
    volumes:
      - ./atp:/app
      - ./nwrfcsdk:/usr/nwrfcsdk
      - log_data:/var/log/gunicorn
      - static_volume:/app/static
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=atp.settings_secure
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${DATABASE_NAME:-atp}
      - MYSQL_USER=${DATABASE_USER:-djangoadmin}
      - MYSQL_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    restart: unless-stopped

  nginx:
    image: nginx:1.19
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    ports:
      - "5000:80"  # Changed: Map port 5000 to nginx's port 80
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
  log_data:
  static_volume: