services:
  web:
    build: .
    container_name: atp_web
    expose:
      - "8000"
    volumes:
      - ./atp:/app
      - ./nwrfcsdk:/usr/nwrfcsdk
      - log_data:/var/log/gunicorn
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-atp.settings_secure}
      - RUNNING_IN_DOCKER=1
      - OLLAMA_BASE_URL=http://192.168.1.101:11434
      - OLLAMA_MODEL=gemma3:4b
      - OLLAMA_TIMEOUT=90
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - atp_network
    extra_hosts:
      - "host.wsl.internal:192.168.1.101"

  db:
    image: mysql:5.7
    container_name: atp_db
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=${DATABASE_NAME:-atp}
      - MYSQL_USER=${DATABASE_USER:-djangoadmin}
      - MYSQL_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    restart: unless-stopped
    networks:
      - atp_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atp_redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - atp_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.19
    container_name: atp_nginx
    volumes:
      - ./nginx-fixed.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    ports:
      - "5000:80"  # Keep port 5000
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - atp_network

networks:
  atp_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
  log_data:
  static_volume:
  media_volume:
