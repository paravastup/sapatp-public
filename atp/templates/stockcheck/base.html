<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=0.75">
  <title>Product Availability</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/v/bs4/dt-1.10.18/b-1.5.4/b-colvis-1.5.4/b-flash-1.5.4/b-html5-1.5.4/cr-1.5.0/kt-2.5.0/r-2.2.2/sc-1.5.0/sl-1.2.6/datatables.min.css"/>

  <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.1.0/css/font-awesome.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/cover.css' %}">

  <!-- ARC Brand_D Theme - MUST LOAD LAST to override all other styles -->
  <link rel="stylesheet" href="{% static 'chatbot/css/acme-corp-theme.css' %}?v=3.0">

<!-- Material Design Bootstrap -->
  <!-- Load jQuery in head to ensure it's available for inline scripts -->
  <script src="https://code.jquery.com/jquery-3.3.1.js" charset="utf-8"></script>
</head>

<body class="text-center">
  {% block content %}
  {% endblock %}

  <!-- Footer - ARC Brand_D Style -->
  <footer class="site-footer">
    <div class="footer-content">
      <nav class="footer-navigation" aria-label="Footer Legal Navigation">
        <ul class="footer-menu">
          <li><a href="{% url 'docs:help' %}" class="footer-link">Help</a></li>
          <li><a href="{% url 'feedback' %}" class="footer-link">Feedback</a></li>
          {% if user.is_superuser %}
          <li><a href="{% url 'admin:index' %}" class="footer-link">Admin Portal</a></li>
          {% endif %}
          <li><a href="https://arccardinal.com" target="_blank" class="footer-link">ACME Corp</a></li>
          <li><a href="https://www.arc-intl.com/en/" target="_blank" class="footer-link">ACME International</a></li>
        </ul>
      </nav>
      <p class="footer-copyright">© 2025 Arc Group International. All rights reserved.</p>
    </div>
  </footer>

  {% block js %}
  {% endblock %}
   <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <!-- jQuery already loaded in head -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>

    <script type="text/javascript" src="https://cdn.datatables.net/buttons/1.5.2/js/dataTables.buttons.min.js" charset="utf-8"></script>
    <script type="text/javascript" src="https://cdn.datatables.net/buttons/1.5.2/js/buttons.bootstrap4.min.js" charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.36/vfs_fonts.js" charset="utf-8"></script>
    <script src="https://cdn.datatables.net/buttons/1.5.2/js/buttons.html5.min.js" charset="utf-8"></script>
    <script src="https://cdn.datatables.net/buttons/1.5.2/js/buttons.print.min.js" charset="utf-8"></script>
    <script src="https://cdn.datatables.net/buttons/1.5.2/js/buttons.colVis.min.js" charset="utf-8"></script>

</html>
