{% extends "stockcheck/base.html"%}
{% block content%}
<div class="container d-flex w-100 h-50 p-3 mx-auto flex-column">
   <header class="masthead mb-auto">
     <div class="inner">
       <h3 class="masthead-brand"><img src="/static/css/index.png" alt="" class="img-rounded center-block" style="height:80px; width:auto;"></h3>
       <nav class="nav nav-masthead justify-content-center">
          {% if user.is_authenticated %}
            <a href="#" class="nav-link">{{user.username}} </a>
            <a href="#" class="nav-link"></a>
            <a class="nav-link" href="{% url 'logout'%}">Log out</a>
            <a class="nav-link" href="{% url 'index' %}">Home</a>
            <a class="nav-link" href="{% url 'docs:help' %}">Help</a>
	    <a class="nav-link" href="{% url 'password_change' %}">Change password</a>
            <a class="nav-link" href="{% url 'feedback'%}"> Feedback </a>
            {% if user.is_superuser %}
              <a class="nav-link" href="{% url 'admin:index' %}">Admin</a>
            {% endif %}
          {% else %}
            <a class="nav-link" href="{% url 'login'%}">Log in</a>
            <a class="nav-link" href="{% url 'docs:help' %}">Help</a>
            <a class="nav-link" href="{% url 'signup' %}">Sign up</a>
          {% endif %}
       </nav>
     </div>
 </header>
<main role="main" class="inner cover">
      <div class="container">
        <br>
        <br>
        <hr>
        <iframe width="800px" height= "640px" src= "" frameborder= "0" marginwidth= "0" marginheight= "0" style= "border: none; max-width:100%; max-height:100vh" allowfullscreen webkitallowfullscreen mozallowfullscreen msallowfullscreen> </iframe>
      </div>
</main>

 </div>
{% endblock %}
{%block js %}
<script type="text/javascript">
$(document).ready(function(e) {
  $('iframe').attr('src','https://tinyurl.com/yy3u8ttt');
});
</script>
{% endblock%}
