version: '3'

services:
  web:
    build: .
    expose:
      - "8000"
    volumes:
      - ./atp:/app
      - ./nwrfcsdk:/usr/nwrfcsdk
      - log_data:/var/log/gunicorn
      - static_volume:/app/static
    environment:
      - DJANGO_SETTINGS_MODULE=atp.settings
      - PYTHONUNBUFFERED=1
      - DATABASE_HOST=db
      - DATABASE_NAME=atp
      - DATABASE_USER=djangoadmin
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      # SAP connection parameters - these will be used for testing
      # In a production environment, you would replace these with your actual SAP credentials
      - SAP_HOST=your-sap-host
      - SAP_SYSNR=00
      - SAP_CLIENT=100
      - SAP_USER=your-sap-user
      - SAP_PASSWORD=your-sap-password
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=atp
      - MYSQL_USER=djangoadmin
      - MYSQL_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.19
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
    ports:
      - "80:80"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  log_data:
  static_volume: