version: '3'

services:
  web:
    build: .
    expose:
      - "5000"
    volumes:
      - ./atp:/app
      - ./nwrfcsdk:/usr/nwrfcsdk
      - log_data:/var/log/gunicorn
      - static_volume:/app/static
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=atp.settings_secure
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - .env
    environment:
      - MYSQL_DATABASE=${DATABASE_NAME}
      - MYSQL_USER=${DATABASE_USER}
      - MYSQL_PASSWORD=${DATABASE_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"  # Only bind to localhost
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.19
    volumes:
      - ./nginx-secure.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - ./ssl:/etc/nginx/ssl  # For SSL certificates when ready
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  log_data:
  static_volume: